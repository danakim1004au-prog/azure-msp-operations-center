name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          python -m py_compile scripts/generate_synthetic_incidents.py ml/train_sla_model.py ml/score_incidents.py

      - name: Terraform format check
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check
